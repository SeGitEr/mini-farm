<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Мини-Ферма ВКонтакте</title>
  <script src="https://unpkg.com/@vkontakte/vk-bridge@2.10.0/dist/browser.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <div class="balance">
      <svg class="coin-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FFC107"/><path d="M12 6v12M9 9h6M9 15h6" stroke="#fff" stroke-width="2"/></svg>
      <span id="coinCount">0</span>
    </div>
    <button class="btn-vk secondary" style="width: auto; padding: 8px 16px;" onclick="game.showShop()">🛒 Магазин</button>
  </div>

  <div class="farm-container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="controls">
    <button class="btn-vk primary" id="adBtn" onclick="ads.watchAd()">📺 Реклама (+50)</button>
    <button class="btn-vk secondary" onclick="state.resetGame()">🔄 Сброс</button>
  </div>

  <!-- Модалка -->
  <div class="modal-overlay" id="shopModal" onclick="game.closeShop(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <h3 style="margin: 0 0 16px;">Магазин семян</h3>
      <div id="shop-list"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Подключаем скрипты ПОСЛЕДОВАТЕЛЬНОСТЬ ВАЖНА! -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ads.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
